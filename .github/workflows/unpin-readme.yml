name: Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # action-build/build.yml has a nested `release` job declaring
    # `contents: write`. GitHub checks permissions statically, so the caller
    # must grant it even though we never set create_release=true here.
    permissions:
      contents: write
    uses: unpins/action-build/.github/workflows/build.yml@main
    with:
      # Hand-rolled Rust flake (mirrors unpins/unpin) — no mkStandaloneFlake,
      # so there is no `.#manifest` for action-build to read. Pass the inputs
      # explicitly, exactly like unpin's workflow, or resolve errors on a
      # missing package_name.
      package_name: 'unpin-readme'
      package_data: false
    secrets:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
